<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Terminal de Kins</title>
    <style>
        :root {
            --pip-green: #18ff62;
            --pip-dark: #071a0b;
            --pip-glow: rgba(24, 255, 98, 0.2);
            --pip-glass: rgba(24, 255, 98, 0.03);
        }

        body {
            background-color: #111;
            color: var(--pip-green);
            font-family: 'Courier New', Courier, monospace;
            text-transform: uppercase;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .pipboy-screen {
            width: 850px; /* Un poco más ancho para acomodar la imagen y la nota */
            height: 550px;
            border: 12px solid #333;
            border-radius: 25px;
            background-color: var(--pip-dark);
            position: relative;
            padding: 30px;
            box-shadow: 0 0 30px var(--pip-glow), inset 0 0 20px black;
        }

        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            z-index: 10;
            pointer-events: none;
            animation: flicker 0.15s infinite;
            opacity: 0.6;
        }

        header nav ul {
            display: flex;
            justify-content: space-between;
            list-style: none;
            padding: 0;
            margin: 0 0 20px 0;
            border-bottom: 3px solid var(--pip-green);
        }

        header nav li {
            padding: 5px 10px;
            font-weight: bold;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
        }

        header nav li:hover {
            background-color: var(--pip-glow);
        }

        header nav li.active {
            background-color: var(--pip-green);
            color: var(--pip-dark);
        }

        /* Contenedor principal ajustado para dos columnas */
        main {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 80%;
            gap: 20px; /* Espacio entre la imagen y la nota */
        }

        /* Estilo para la imagen del boceto */
        .sketch-container {
            flex: 1; /* Ocupa espacio proporcional */
            max-width: 40%; /* Limita el ancho máximo */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .sketch-image {
            max-width: 100%;
            max-height: 350px; /* Ajusta la altura máxima para que quepa bien */
            height: auto; /* Mantiene la proporción */
            border: 2px solid var(--pip-green);
            box-shadow: 0 0 10px var(--pip-glow);
            /* Aplica filtro verde Pip-Boy a la imagen */
            filter: sepia(100%) saturate(300%) brightness(90%) hue-rotate(60deg) contrast(120%);
            opacity: 0.8;
        }

        /* Estilo de la nota de Merlín (ajustado para el nuevo diseño) */
        .exorcism-note {
            flex: 1.5; /* Ocupa un poco más de espacio que la imagen */
            text-align: center;
            border: 2px solid var(--pip-green);
            padding: 20px;
            background-color: var(--pip-glass);
            box-shadow: 0 0 15px var(--pip-glow);
            max-width: 55%;
        }

        .note-title {
            font-weight: bold;
            text-decoration: underline;
            margin-bottom: 15px;
            display: block;
            font-size: 1.1em;
        }

        .note-content p {
            margin: 8px 0;
            line-height: 1.3;
            font-size: 0.95em;
        }

        @keyframes flicker {
            0% { opacity: 0.55; }
            50% { opacity: 0.60; }
            100% { opacity: 0.58; }
        }
    </style>
</head>
<body>

    <div class="pipboy-screen">
        <div class="scanlines"></div>
        
        <header>
            <nav>
                <ul>
                    <li onclick="pedirPassword()">LISTA</li>
                    <li onclick="pedirPassword()">DESENCRIPTAR</li>
                    <li class="active">NOTAS IMPORTANTES</li>
                    <li onclick="pedirPassword()">MAPA</li>
                    <li onclick="pedirPassword()">RADIO</li>
                </ul>
            </nav>
        </header>

        <main id="main-content">
            <div class="sketch-container">
                <img src="sketch1775367335732.gif" alt="Boceto de Exorcismo" class="sketch-image">
            </div>

            <div class="exorcism-note">
                <span class="note-title">Encantamientos para exorcizar a un demonio</span>
                <div class="note-content">
                    <p>“¡Hullabaloo y Ihaudytoo!</p>
                    <p>¡Langostinos rancios y Timbuctú!</p>
                    <p>¡Tepsima y ipetoo!</p>
                    <p>¡Patada en la pierna y Hoo hoo hoo!”</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        function pedirPassword() {
            let psw = prompt("INGRESE CONTRASEÑA DE ADMINISTRADOR:");
            if (psw !== null) {
                alert("ERROR CRÍTICO: CONTRASEÑA INCORRECTA.\nACCESO DENEGADO AL SECTOR.");
            }
        }
    </script>

</body>
</html>
