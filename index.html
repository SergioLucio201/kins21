<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Terminal de Kins</title>
    <style>
        :root {
            --pip-green: #18ff62;
            --pip-dark: #071a0b;
            --pip-glow: rgba(24, 255, 98, 0.2);
        }

        body {
            background-color: #111;
            color: var(--pip-green);
            font-family: 'Courier New', Courier, monospace;
            text-transform: uppercase;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .pipboy-screen {
            width: 750px;
            height: 500px;
            border: 12px solid #333;
            border-radius: 25px;
            background-color: var(--pip-dark);
            position: relative;
            padding: 30px;
            box-shadow: 0 0 30px var(--pip-glow), inset 0 0 20px black;
        }

        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            z-index: 10;
            pointer-events: none;
            animation: flicker 0.15s infinite;
            opacity: 0.6;
        }

        header nav ul {
            display: flex;
            justify-content: space-between;
            list-style: none;
            padding: 0;
            margin: 0 0 20px 0;
            border-bottom: 3px solid var(--pip-green);
        }

        header nav li {
            padding: 5px 10px;
            font-weight: bold;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.2s;
        }

        header nav li:hover {
            background-color: var(--pip-glow);
        }

        header nav li.active {
            background-color: var(--pip-green);
            color: var(--pip-dark);
        }

        main {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 75%;
        }

        .exorcism-note {
            text-align: center;
            border: 2px solid var(--pip-green);
            padding: 25px;
            background-color: rgba(24, 255, 98, 0.05);
            box-shadow: 0 0 15px var(--pip-glow);
            max-width: 85%;
        }

        .note-title {
            font-weight: bold;
            text-decoration: underline;
            margin-bottom: 20px;
            display: block;
        }

        .note-content p {
            margin: 10px 0;
            line-height: 1.4;
        }

        @keyframes flicker {
            0% { opacity: 0.55; }
            50% { opacity: 0.60; }
            100% { opacity: 0.58; }
        }
    </style>
</head>
<body>

    <div class="pipboy-screen">
        <div class="scanlines"></div>
        
        <header>
            <nav>
                <ul>
                    <li onclick="pedirPassword()">LISTA</li>
                    <li onclick="pedirPassword()">DESENCRIPTAR</li>
                    <li class="active">NOTAS IMPORTANTES</li>
                    <li onclick="pedirPassword()">MAPA</li>
                    <li onclick="pedirPassword()">RADIO</li>
                </ul>
            </nav>
        </header>

        <main id="main-content">
            <div class="exorcism-note">
                <span class="note-title">Encantamientos para exorcizar a un demonio</span>
                <div class="note-content">
                    <p>“¡Hullabaloo y Ihaudytoo!</p>
                    <p>¡Langostinos rancios y Timbuctú!</p>
                    <p>¡Tepsima y ipetoo!</p>
                    <p>¡Patada en la pierna y Hoo hoo hoo!”</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        function pedirPassword() {

            let psw = prompt("INGRESE CONTRASEÑA DE ADMINISTRADOR:");

            if (psw !== null) {
                alert("ERROR CRÍTICO: CONTRASEÑA INCORRECTA.\nACCESO DENEGADO AL SECTOR.");
            }
        }
    </script>

</body>
</html>
